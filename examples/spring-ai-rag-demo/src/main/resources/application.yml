spring:
  application:
    name: spring-ai-rag-demo
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  observations:
    annotations:
      enabled: true

rag:
  search:
    top-k: ${RAG_TOP_K:4}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.65}
